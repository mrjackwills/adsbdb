networks:
  dev-adsbdb-net:
    name: dev-adsbdb-net
services:
  adsbdb_postgres:
    image: adsbdb_postgres:0.5.0
    container_name: adsbdb_postgres
    build:
      context: /workspaces/adsbdb/
      dockerfile: /workspaces/adsbdb/docker/dockerfile/postgres.Dockerfile
    env_file: /workspaces/adsbdb/docker/env/.postgres.env
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    ipc: private
    restart: always
    shm_size: 512MB
    volumes:
      - /data/adsbdb/pg_data:/pg_data
    command: -c max_wal_size=4GB
    ports:
      - 127.0.0.1:5432:5432
    networks:
      - dev-adsbdb-net
    logging:
      driver: "json-file"
      options:
        max-size: "16m"
    healthcheck:
      test: ["CMD", "/healthcheck/health_postgres.sh"]
      start_period: 2m
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2048MB

  adsbdb_redis:
    image: adsbdb_redis:0.5.0
    container_name: adsbdb_redis
    hostname: adsbdb_redis
    build:
      context: /workspaces/adsbdb/
      dockerfile: /workspaces/adsbdb/docker/dockerfile/redis.Dockerfile
    env_file: /workspaces/adsbdb/docker/env/.redis.env
    volumes:
      - /data/adsbdb/redis_data:/redis_data
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    ipc: private
    restart: always
    ports:
      - 127.0.0.1:6379:6379
    networks:
      - dev-adsbdb-net
    logging:
      driver: "json-file"
      options:
        max-size: "16m"
    healthcheck:
      test: ["CMD", "/healthcheck/health_redis.sh"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1024MB
  adsbdb_postgres_backup:
    image: adsbdb_postgres_backup:0.5.0
    container_name: adsbdb_postgres_backup
    build:
      context: /workspaces/adsbdb/
      dockerfile: /workspaces/adsbdb/docker/dockerfile/postgres_backup.Dockerfile
    env_file: /workspaces/adsbdb/docker/env/.postgres_backup.env
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    ipc: private
    volumes:
      - /data/adsbdb/backups:/backups
      - /data/adsbdb/redis_data:/redis_data:ro
      - /data/adsbdb/logs:/logs
    networks:
      - dev-adsbdb-net
    logging:
      driver: "json-file"
      options:
        max-size: "16m"
    depends_on:
      adsbdb_postgres:
        condition: service_healthy
    restart: 'no'
    deploy:
      resources:
        limits:
          memory: 32M
  adsbdb_api:
    image: adsbdb_api:0.5.0
    container_name: adsbdb_api
    hostname: adsbdb_api
    build:
      context: /workspaces/adsbdb/
      dockerfile: /workspaces/adsbdb/docker/dockerfile/api.Dockerfile
    volumes:
      - /data/adsbdb/logs:/logs
      - /workspaces/adsbdb/docker/env/.api.env:/app_env/.api.env:ro
    ports:
      - "127.0.0.1:8282:8282"
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    ipc: private
    restart: always
    networks:
      - dev-adsbdb-net
    logging:
      driver: "json-file"
      options:
        max-size: "16m"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "/healthcheck/health_api.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      adsbdb_postgres:
        condition: service_healthy
      adsbdb_redis:
        condition: service_healthy

